name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: Expand-Archive -Path ProductivityHubMaui.zip -DestinationPath . -Force
        shell: pwsh

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore ProductivityHubMaui/ProductivityHubMaui.csproj

      - name: Build APK
        run: dotnet build ProductivityHubMaui/ProductivityHubMaui.csproj -c Debug -f net9.0-android -p:AndroidPackageFormat=apk --no-restore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: productivityhub-apk
          path: '**/*.apk'
          if-no-files-found: error
